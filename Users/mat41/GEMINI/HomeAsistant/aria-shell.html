<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<title>ARIA REALITY CORE v15</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg0:#07080f;--bg1:#0d0e18;--bg2:#131520;--bg3:#1a1c2a;--bg4:#222436;--acc:#00c8ff;--accg:#00ffcc;--bdr:#ffffff09;--bdr2:#ffffff14;--bdr3:#ffffff22;--txt:#eef0ff;--txt2:#7880aa;--txt3:#3a3e5a}
.th-orange{--acc:#ff9900;--accg:#ffcc44}
.th-purple{--bg0:#0d0a18;--bg1:#130f1e;--bg2:#181428;--bg3:#201a32;--acc:#bb88ff;--accg:#ff66aa}
.th-green{--bg0:#060e08;--bg1:#0a1410;--bg2:#0f1914;--bg3:#141f18;--acc:#00ff88;--accg:#88ffcc}
.th-red{--acc:#ff4455;--accg:#ff8899}
.th-pink{--acc:#ff66aa;--accg:#ffaacc}
.th-amber{--acc:#ffcc00;--accg:#ffe066}
.th-white{--acc:#e0e8ff;--accg:#99aac8}
html,body{width:100vw;height:100vh;overflow:hidden;background:var(--bg0)}
.dash{width:100%;height:100%;display:flex;flex-direction:column;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg0);color:var(--txt)}
.topbar{height:52px;background:var(--bg1);border-bottom:1px solid var(--bdr);padding:0 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative;z-index:10}
.t-logo{font-size:13px;font-weight:700;letter-spacing:.5px;color:var(--txt);white-space:nowrap;flex-shrink:0}
.t-logo span{color:var(--acc)}.t-logo small{display:block;font-size:7px;color:var(--txt3);letter-spacing:1.5px;font-weight:400;margin-top:-1px}
/* SEARCH + HEALTH GROUP */
.t-sg{display:flex;align-items:center;gap:6px;flex:1;max-width:380px;margin:0 auto}
.t-search{position:relative;flex:1}
.t-search input{width:100%;background:var(--bg2);border:1px solid var(--bdr2);border-radius:10px;color:var(--txt);font-size:11px;padding:6px 26px 6px 28px;outline:none;transition:border .2s}
.t-search input:focus{border-color:var(--acc)}
.t-search input::placeholder{color:var(--txt3)}
.t-search .si{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:13px;pointer-events:none}
.s-res{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg1);border:1px solid var(--bdr2);border-radius:12px;overflow:hidden;display:none;max-height:360px;overflow-y:auto;z-index:200;box-shadow:0 8px 32px #000a;min-width:320px}
.s-item{padding:7px 10px;display:flex;align-items:center;gap:7px;cursor:pointer;border-bottom:1px solid var(--bdr);font-size:10px;transition:background .12s}
.s-item:hover{background:var(--bg3)}.s-item:last-child{border-bottom:none}
.s-info{width:26px;height:26px;border-radius:50%;border:1.5px solid rgba(0,200,255,.35);background:rgba(0,200,255,.08);color:rgba(0,200,255,.7);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.s-info:hover,.s-info:active{border-color:var(--acc);color:var(--acc);background:rgba(0,200,255,.2);transform:scale(1.12)}
.s-sep{padding:5px 12px;font-size:8px;font-weight:700;letter-spacing:1.5px;color:var(--txt3);background:var(--bg2);border-bottom:1px solid var(--bdr)}
.s-cat{font-size:7px;font-weight:700;padding:2px 6px;border-radius:8px;background:var(--bg3);color:var(--txt3);white-space:nowrap;flex-shrink:0}
/* HEALTH BUTTON */
.hb{display:flex;align-items:center;gap:6px;padding:6px 13px 6px 10px;border-radius:20px;cursor:pointer;flex-shrink:0;border:1.5px solid transparent;transition:all .3s;user-select:none;font-size:10px;font-weight:800;letter-spacing:1.8px;white-space:nowrap}
.hb:hover{filter:brightness(1.25)}.hb:active{transform:scale(.95)}
.hb.ok  {background:#00ff8810;border-color:#00ff8844}
.hb.warn{background:#ff990014;border-color:#ff990044}
.hb.crit{background:#ff445514;border-color:#ff445599;animation:hBlink .8s ease-in-out infinite}
@keyframes hBlink{0%,100%{border-color:#ff445544}50%{border-color:#ff4455cc}}
.hp{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:all .3s}
.hb.ok   .hp{background:#00ff88;box-shadow:0 0 5px #00ff8888;animation:hP 2.5s ease-in-out infinite}
.hb.warn .hp{background:#ff9900;box-shadow:0 0 5px #ff990088;animation:hP 1.5s ease-in-out infinite}
.hb.crit .hp{background:#ff4455;box-shadow:0 0 7px #ff445588;animation:hP .8s ease-in-out infinite}
@keyframes hP{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
.hl{font-size:9px;font-weight:800;letter-spacing:.8px;transition:color .3s}
.hb.ok .hl{color:#00ff88}.hb.warn .hl{color:#ff9900}.hb.crit .hl{color:#ff4455}
/* HEALTH POPUP */
#hpo{display:none;position:fixed;inset:0;z-index:490;background:#00000055;backdrop-filter:blur(2px)}
#hpo.show{display:block}
#hpb{display:none;position:fixed;top:60px;right:14px;z-index:500;width:320px;max-height:calc(100vh - 80px);overflow-y:auto;background:var(--bg1);border:1px solid var(--bdr2);border-radius:18px;box-shadow:0 12px 48px #000c;animation:hpS .18s ease}
#hpb.show{display:block}
@keyframes hpS{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.hph{padding:13px 15px 9px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:9px}
.hphd{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.hphd.ok{background:#00ff88;box-shadow:0 0 5px #00ff8888}
.hphd.warn{background:#ff9900;box-shadow:0 0 5px #ff990088}
.hphd.crit{background:#ff4455;box-shadow:0 0 5px #ff445588}
.hpt{flex:1;font-size:11px;font-weight:800;letter-spacing:.5px}
.hpx{background:none;border:1px solid var(--bdr2);color:var(--txt3);border-radius:7px;padding:3px 10px;cursor:pointer;font-size:11px;transition:all .2s}
.hpx:hover{border-color:var(--acc)55;color:var(--acc)}
.hpbody{padding:11px 13px 13px;display:flex;flex-direction:column;gap:7px}
.hps{background:var(--bg2);border:1px solid var(--bdr);border-radius:11px;overflow:hidden}
.hpsh{padding:7px 11px;display:flex;align-items:center;gap:6px;font-size:8px;font-weight:700;letter-spacing:1px;color:var(--txt2);border-bottom:1px solid var(--bdr)}
.hpsh i{font-size:12px}
.hpr{display:flex;align-items:center;gap:7px;padding:6px 11px;font-size:10px;border-bottom:1px solid var(--bdr)}
.hpr:last-child{border-bottom:none}
.hpr-l{flex:1;color:var(--txt2)}.hpr-v{font-weight:700;font-size:10px}
.hds{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.hds.ok{background:#00ff88;box-shadow:0 0 3px #00ff8888}
.hds.warn{background:#ff9900;box-shadow:0 0 3px #ff990088}
.hds.err{background:#ff4455;box-shadow:0 0 3px #ff445588}
.c-ok{color:#00ff88}.c-warn{color:#ff9900}.c-err{color:#ff4455}
.hpref{width:100%;padding:8px;background:var(--acc)0e;border:1px solid var(--acc)33;border-radius:9px;color:var(--acc);font-size:10px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:all .2s;margin-top:2px}
.hpref:hover{background:var(--acc)1a}
.theme-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;flex-shrink:0;background:var(--acc);border:2px solid var(--acc);box-shadow:0 0 8px var(--acc)66;transition:all .2s;user-select:none}
.t-clock{text-align:right;flex-shrink:0}
.t-clk{font-size:15px;font-weight:700;color:var(--txt);letter-spacing:2px;font-variant-numeric:tabular-nums}
.t-dt{font-size:8px;color:var(--txt3)}
.theme-picker{position:absolute;top:56px;right:8px;background:var(--bg2);border:1px solid var(--bdr3);border-radius:14px;padding:12px 14px;z-index:200;display:none;box-shadow:0 8px 32px #00000077}
.theme-picker.show{display:block}
.tp-lbl{font-size:8px;color:var(--txt3);letter-spacing:1.5px;margin-bottom:10px;text-align:center}
.tp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.tp-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.tp-dot{width:32px;height:32px;border-radius:50%;border:2px solid transparent;transition:all .2s}
.tp-dot:hover{transform:scale(1.15)}
.tp-dot.cur{border-color:#fff;box-shadow:0 0 10px currentColor}
.tp-name{font-size:8px;color:var(--txt3)}
.tabs{height:62px;background:var(--bg1);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 8px;gap:4px;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 18px;border-radius:12px;cursor:pointer;font-size:13px;font-weight:700;color:var(--txt3);letter-spacing:.3px;white-space:nowrap;border:1.5px solid transparent;transition:all .25s;display:flex;align-items:center;gap:7px;flex-shrink:0}
.tab.on{color:var(--acc);border-color:var(--acc)55;background:var(--acc)0d}
.tab i{font-size:17px}
.tb{font-size:8px;font-weight:700;padding:1px 5px;border-radius:8px;background:var(--acc);color:var(--bg0);line-height:1.5}
.tabs-flex{flex:1}
.tab-cnt{font-size:10px;color:var(--txt3);padding:0 6px;letter-spacing:.5px;white-space:nowrap}
.content{flex:1;overflow:hidden;position:relative}
.scr{height:100%;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch}
.sec{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--txt3);margin:4px 0 10px;text-transform:uppercase}
.pop-ov{position:absolute;inset:0;background:#00000099;z-index:100;display:flex;align-items:center;justify-content:center}
.pop{background:var(--bg2);border:1px solid var(--bdr3);border-radius:16px;padding:16px;width:240px;position:relative;max-height:90vh;overflow-y:auto}
.pop-x{position:absolute;top:10px;right:12px;color:var(--txt3);cursor:pointer;font-size:15px;z-index:1}
.pop-ico{font-size:38px;text-align:center;margin-bottom:6px}
.pop-title{font-size:13px;font-weight:700;color:var(--txt);text-align:center;margin-bottom:2px}
.pop-sub{font-size:9px;color:var(--txt2);text-align:center;margin-bottom:10px}
.pop-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bdr);font-size:10px}
.pop-k{color:var(--txt2)}.pop-v{color:var(--txt);font-weight:600}
.pop-btn{margin-top:10px;width:100%;padding:8px;background:var(--acc);border:none;border-radius:8px;color:var(--bg0);font-size:10px;cursor:pointer;font-weight:700}
.toast{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--bdr2);border-radius:10px;padding:8px 18px;font-size:11px;color:var(--txt);white-space:nowrap;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
@keyframes spinA{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes rCW{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes rCCW{from{transform:rotate(0)}to{transform:rotate(-360deg)}}
@keyframes aBreath{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:.9;transform:scale(1.06)}}
@keyframes ariaGlow{0%,100%{filter:drop-shadow(0 0 4px var(--acc))}50%{filter:drop-shadow(0 0 14px var(--acc))}}
@keyframes pulseAlert{0%,100%{box-shadow:none}50%{box-shadow:0 0 10px #ffd70033}}
@keyframes poolWave{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-4px) scale(1.1)}}
@keyframes shimY{0%,100%{opacity:.25}50%{opacity:.7}}
@keyframes slideDown{from{max-height:0;opacity:0}to{max-height:200px;opacity:1}}
@keyframes pulseR{0%,100%{opacity:.2}50%{opacity:.8}}
/* ═══════════════ ANIMATIONS GLOBALES ARIA ═══════════════ */
@keyframes tabIconGlow{0%,100%{filter:drop-shadow(0 0 4px var(--acc));transform:scale(1)}50%{filter:drop-shadow(0 0 12px var(--acc)) drop-shadow(0 0 22px var(--acc));transform:scale(1.15)}}
@keyframes tabBorder{0%,100%{box-shadow:0 0 0 rgba(0,0,0,0),inset 0 0 0 rgba(0,0,0,0)}50%{box-shadow:0 0 14px var(--acc)33,inset 0 0 8px var(--acc)11}}
@keyframes floatIcon{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes heartBeat{0%,100%{transform:scale(1)}14%{transform:scale(1.22)}28%{transform:scale(1)}42%{transform:scale(1.12)}70%{transform:scale(1)}}
@keyframes soundWave{0%,100%{transform:scaleY(.35);opacity:.5}50%{transform:scaleY(1.3);opacity:1}}
@keyframes lightFlicker{0%,100%{filter:drop-shadow(0 0 6px #ffd700);opacity:1}45%{filter:drop-shadow(0 0 18px #ffd700) drop-shadow(0 0 32px #ffd70044);opacity:.92}50%{filter:drop-shadow(0 0 22px #ffd700) drop-shadow(0 0 40px #ffd70055);opacity:1}}
@keyframes alarmBeat{0%,100%{color:#ff4455;filter:drop-shadow(0 0 3px #ff4455)}50%{color:#ff8899;filter:drop-shadow(0 0 12px #ff4455)}}
@keyframes presencePulse{0%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.5}100%{transform:scale(1);opacity:1}}
@keyframes volBar{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1.25)}}
@keyframes glowExpand{0%,100%{box-shadow:0 0 6px var(--acc)33}50%{box-shadow:0 0 18px var(--acc)66,0 0 36px var(--acc)22}}
@keyframes fanGlow{0%,100%{filter:drop-shadow(0 0 2px currentColor)}50%{filter:drop-shadow(0 0 10px currentColor) drop-shadow(0 0 20px currentColor)}}
@keyframes tempPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.8;transform:scale(1.04)}}
@keyframes badgeBounce{0%,100%{transform:scale(1)}40%{transform:scale(1.35)}60%{transform:scale(1.25)}}
@keyframes mediaGlow{0%,100%{filter:drop-shadow(0 0 5px var(--mb-col,var(--acc)));transform:scale(1)}50%{filter:drop-shadow(0 0 18px var(--mb-col,var(--acc))) drop-shadow(0 0 32px var(--mb-col,var(--acc))44);transform:scale(1.08)}}
@keyframes shimmerCard{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes dotRing{0%{box-shadow:0 0 0 0 var(--acc)88}70%{box-shadow:0 0 0 8px var(--acc)00}100%{box-shadow:0 0 0 0 var(--acc)00}}
/* Application globale */
.tab.on i{animation:tabIconGlow 2.5s ease-in-out infinite}
.tab.on{animation:tabBorder 3s ease-in-out infinite}
.tab i{transition:all .25s}
.tab:hover i{transform:scale(1.2);filter:drop-shadow(0 0 6px var(--acc))}
.tb{animation:badgeBounce 1.2s ease-in-out infinite}
/* ── Bouton ARIA ── */
@keyframes ariaBtnPulse{0%,100%{box-shadow:0 0 6px rgba(0,200,255,.12),inset 0 0 4px rgba(0,200,255,.06)}50%{box-shadow:0 0 18px rgba(0,200,255,.28),inset 0 0 10px rgba(0,200,255,.12)}}
@keyframes ariaOrbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes ariaOrbitR{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
@keyframes ariaCorePulse{0%,100%{r:3.5}50%{r:4.8}}
.aria-tab-btn{display:flex;align-items:center;gap:6px;padding:6px 13px 6px 8px;border-radius:20px;cursor:pointer;border:1.5px solid rgba(0,200,255,.3);background:rgba(0,200,255,.06);color:#00c8ff;font-size:10px;font-weight:800;letter-spacing:1.8px;white-space:nowrap;flex-shrink:0;user-select:none;transition:all .3s;animation:ariaBtnPulse 3s ease-in-out infinite;position:relative;overflow:hidden}
.aria-tab-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(0,200,255,.06),transparent);transform:translateX(-100%);transition:transform .4s}
.aria-tab-btn:hover{border-color:rgba(0,200,255,.6);background:rgba(0,200,255,.13);box-shadow:0 0 22px rgba(0,200,255,.22);letter-spacing:2px}
.aria-tab-btn:hover::before{transform:translateX(100%)}
.aria-tab-btn:active{transform:scale(.95)}
.aria-orb-svg{overflow:visible;flex-shrink:0}
.aria-orb-orbit1{transform-origin:12px 12px;animation:ariaOrbit 3.5s linear infinite}
.aria-orb-orbit2{transform-origin:12px 12px;animation:ariaOrbitR 5s linear infinite}
/* ── Bouton AIDE ── */
@keyframes aidePulse{0%,100%{box-shadow:0 0 5px rgba(0,229,255,.1),inset 0 0 3px rgba(0,229,255,.07)}50%{box-shadow:0 0 22px rgba(0,229,255,.36),inset 0 0 10px rgba(0,229,255,.15)}}
@keyframes aideOrbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes aideQGlow{0%,100%{opacity:.72;filter:drop-shadow(0 0 2px rgba(0,229,255,.5))}50%{opacity:1;filter:drop-shadow(0 0 8px rgba(0,229,255,.95)) drop-shadow(0 0 16px rgba(0,229,255,.4))}}
.aide-btn{display:flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:50%;border:1.5px solid rgba(0,229,255,.3);background:rgba(0,229,255,.07);text-decoration:none;flex-shrink:0;transition:all .3s;animation:aidePulse 3s ease-in-out infinite;overflow:visible;position:relative}
.aide-btn:hover{border-color:rgba(0,229,255,.68);background:rgba(0,229,255,.16);transform:scale(1.11);box-shadow:0 0 28px rgba(0,229,255,.3)}
.aide-btn:active{transform:scale(.91)}
.aide-orb-svg{overflow:visible;flex-shrink:0}
.aide-orbit-ring{transform-origin:14px 14px;animation:aideOrbit 5.5s linear infinite}
.aide-q-txt{animation:aideQGlow 2.2s ease-in-out infinite}

</style>
</head>
<body>
<div class="dash th-cyan" id="dash">
<div class="topbar">
  <div class="t-logo"><div>⊙ ARIA <span>REALITY</span> CORE</div><small>HOME ASSISTANT · v15</small></div>
  <div style="flex:1"></div>
  <div class="aria-tab-btn" onclick="window.location.href='/local/aria-local.html'" title="ARIA Assistant vocal">
    <svg class="aria-orb-svg" viewBox="0 0 24 24" width="26" height="26" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs><radialGradient id="atg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#c0ffff"/><stop offset="55%" stop-color="#00c8ff"/><stop offset="100%" stop-color="#0040c0"/></radialGradient></defs>
      <circle cx="12" cy="12" r="10.5" stroke="#00c8ff" stroke-width="0.5" fill="none"><animate attributeName="r" values="9.5;11.5;9.5" dur="2.4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.1;0.38;0.1" dur="2.4s" repeatCount="indefinite"/></circle>
      <g class="aria-orb-orbit1"><ellipse cx="12" cy="12" rx="9" ry="3.5" stroke="#00d4ff" stroke-width="0.7" fill="none" opacity="0.5"/><circle cx="21" cy="12" r="1.4" fill="#00eeff" opacity="0.9"><animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/></circle></g>
      <g class="aria-orb-orbit2" style="transform-origin:12px 12px;transform:rotate(60deg)"><ellipse cx="12" cy="12" rx="8" ry="3" stroke="#00a8ff" stroke-width="0.5" fill="none" opacity="0.35"/><circle cx="20" cy="12" r="1" fill="#80e0ff" opacity="0.7"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.2s" repeatCount="indefinite"/></circle></g>
      <circle cx="12" cy="12" r="5.5" fill="#010c14" stroke="#00a0cc" stroke-width="1"><animate attributeName="stroke" values="#007aaa;#00eeff;#007aaa" dur="2.8s" repeatCount="indefinite"/></circle>
      <circle cx="12" cy="12" r="3.5" fill="url(#atg)"><animate attributeName="r" values="3;4.2;3" dur="2s" repeatCount="indefinite"/></circle>
      <circle cx="12" cy="5.5" r="0.9" fill="#00ffff"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.3s" repeatCount="indefinite"/></circle>
      <circle cx="12" cy="18.5" r="0.9" fill="#00ffff"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.7s" repeatCount="indefinite"/></circle>
      <circle cx="5.5" cy="12" r="0.9" fill="#00ffff"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.1s" repeatCount="indefinite"/></circle>
      <circle cx="18.5" cy="12" r="0.9" fill="#00ffff"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/></circle>
    </svg>
    ARIA
  </div>
  <div class="t-sg">
    <div class="t-search">
      <i class="ti ti-search si"></i>
      <input placeholder="Lumières, routines, appareils…" id="sIn" oninput="doSearch(this.value)" onkeydown="onSKey(event)" autocomplete="off">
      <div class="s-res" id="sRes"></div>
    </div>
  </div>
  <a href="/local/aide/index.html" title="Centre d'aide ARIA" class="aide-btn">

function _ariaOverlay(msg){
  if(document.getElementById('aria-play-overlay'))return;
  // Empêcher la mise en veille pendant la lecture
  let _wl=null;
  try{if(window.fully)window.fully.keepScreenOn(true);}catch(_){}
  if(navigator.wakeLock)navigator.wakeLock.request('screen').then(w=>{_wl=w;}).catch(()=>{});
  const overlay=document.createElement('div');
  overlay.id='aria-play-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:#000;z-index:9999;display:flex;align-items:center;justify-content:center';
  const vid=document.createElement('video');
  vid.src='/local/ARIA/MP4ARIA/aria_parle.mp4';
  vid.autoplay=true;vid.playsInline=true;vid.muted=true;vid.loop=true;
  vid.style.cssText='max-width:100%;max-height:100%;object-fit:contain';
  vid.onerror=function(){overlay.remove();};
  overlay.appendChild(vid);
  document.body.appendChild(overlay);
  function _done(){
    if(!document.getElementById('aria-play-overlay'))return;
    overlay.remove();
    // Relâcher le wake lock quand c'est fini
    try{if(_wl)_wl.release();}catch(_){}
    try{if(window.fully)window.fully.keepScreenOn(false);}catch(_){}
  }
  if(msg){
    fetch('/api/tts_get_url',{method:'POST',headers:{'Authorization':'Bearer '+HA_TOKEN,'Content-Type':'application/json'},
      body:JSON.stringify({engine_id:'tts.piper_2',language:'fr_FR',options:{voice:'fr_FR-siwis-medium'},message:msg})
    }).then(r=>r.json()).then(d=>{
      if(!d.url)return _done();
      const aud=new Audio(d.url);
      aud.onended=_done;aud.onerror=_done;
      aud.play().catch(_done);
    }).catch(_done);
    setTimeout(_done,30000);
  }else{
    setTimeout(_done,8000);
  }
}

      if(!document.getElementById('tab8')||!window._ariaOverlay){window.location.replace(window.location.pathname+'?_='+v);return;}

      ns.src='/local/aria-state.js?v='+v;document.head.appendChild(ns);

      document.head.appendChild(_sc);
      showToast('✓ Interface mise à jour (v'+v+')');
    }catch(e){}
  }
  setInterval(_checkVersion,15000); // poll léger toutes les 15s
})();

}

function updCnt(){
  const nl=S.lights.filter(l=>haState(l.haEntity)==='on').length;
  const nc=S.clims.filter(c=>c.on).length;const n=nl+nc;
  const el=document.getElementById('act-cnt');if(el)el.textContent=n+' actif'+(n>1?'s':'');
}

function togLight(id){
  const l=S.lights.find(x=>x.id===id);if(!l)return;
  const st=haState(l.haEntity);const isSwitch=l.haEntity.startsWith('switch.');
  if(!S._stMap[l.haEntity])S._stMap[l.haEntity]={entity_id:l.haEntity,state:'',attributes:{}};
  S._stMap[l.haEntity]=Object.assign({},S._stMap[l.haEntity],{state:st==='on'?'off':'on'});
  haCall(isSwitch?'switch':'light','toggle',{entity_id:l.haEntity});
  showToast(st==='on'?'💡 Éteinte':'💡 Allumée');
  if(window.renderCurrent)window.renderCurrent();updCnt();haScheduleRefresh(1500);
}

// ── Recherche universelle ─────────────────────────────────────────────────────
function doSearch(v){
  const res=document.getElementById('sRes');
  if(!v||v.length<1){closeSR();return;}
  const q=v.toLowerCase().trim();
  const secs=[];
  const _go=(ti,tk)=>{showTab(ti,tk);closeSR();document.getElementById('sIn').value='';};
  const _p=(eid)=>`_srEntityPop('${eid}')`;
  // Bouton action coloré
  const _ib=(lbl,onclick,col)=>
    `<button onclick="event.stopPropagation();${onclick}" style="font-size:8px;padding:2px 7px;border:1px solid ${col||'#444'};border-radius:6px;background:${col?col+'18':'rgba(255,255,255,.04)'};color:${col||'var(--txt3)'};cursor:pointer;white-space:nowrap;flex-shrink:0">${lbl}</button>`;
  // Bouton ℹ rond universel
  const _info=(eid)=>
    `<div class="s-info" onclick="event.stopPropagation();${_p(eid)}" title="Détails & contrôles"><i class="ti ti-info-circle" style="font-size:13px"></i></div>`;

  // ── Correspondances dans toutes les entités ───────────────────────────────
  const allMatches=Object.values(S._stMap||{}).filter(s=>{
    const fn=(s.attributes?.friendly_name||'').toLowerCase();
    const alias=(s.attributes?.entity_category||'').toLowerCase();
    return fn.includes(q)||s.entity_id.toLowerCase().includes(q)||alias.includes(q);
  });

  // ── 0. Navigation ─────────────────────────────────────────────────────────
  const TNAV=[
    {i:0,k:'accueil', n:'Accueil',  ico:'ti-home',                d:'Lumières & appareils',    alias:'maison lumiere interrupteur'},
    {i:1,k:'climat',  n:'Climat',   ico:'ti-wind',                d:'Climatiseurs · chauffage', alias:'clim air froid chaud temperature'},
    {i:2,k:'media',   n:'Média',    ico:'ti-music',               d:'TV · musique · enceintes', alias:'tv son musique bbox google nest'},
    {i:3,k:'securite',n:'Sécurité', ico:'ti-shield',              d:'Alarme · caméras · portes',alias:'alarme camera porte serrure verrou'},
    {i:4,k:'radar',   n:'Radar',    ico:'ti-radar',               d:'Carte · présence famille', alias:'gps geo carte presence matthias vichara tablette'},
    {i:5,k:'auto',    n:'Automations',ico:'ti-settings-automation',d:'Routines · programmes',   alias:'automation routine programme horaire'},
    {i:6,k:'systeme', n:'Système',  ico:'ti-cpu',                 d:'Santé HA · énergie',       alias:'sante energie disque memoire cpu'},
  ];
  const tabs=TNAV.filter(t=>[t.n,t.d,t.k,t.alias].join(' ').toLowerCase().includes(q));
  if(tabs.length)secs.push({lbl:'📋 NAVIGATION',col:'var(--acc)',
    html:tabs.map(t=>`<div class="s-item" onclick="_go(${t.i},'${t.k}')">
      <i class="ti ${t.ico}" style="color:var(--acc);font-size:14px;width:18px;flex-shrink:0"></i>
      <div style="flex:1"><div style="font-size:10px;font-weight:700;color:var(--txt)">${t.n}</div>
      <div style="font-size:8px;color:var(--txt3)">${t.d}</div></div>
      <span class="s-cat">ONGLET</span></div>`).join('')});

  // ── Groupe générique par domaine ──────────────────────────────────────────
  const byDom={};
  allMatches.forEach(s=>{
    const d=s.entity_id.split('.')[0];
    (byDom[d]||(byDom[d]=[])).push(s);
  });

  // Lumières connues (togLight) + lumières brutes HA
  const ltKnown=(S.lights||[]).filter(l=>(l.n+' lumiere '+l.haEntity).toLowerCase().includes(q));
  const ltHA=allMatches.filter(s=>s.entity_id.startsWith('light.')&&!ltKnown.find(l=>l.haEntity===s.entity_id));
  if(ltKnown.length||ltHA.length)secs.push({lbl:'💡 LUMIÈRES',col:'#ffd700',
    html:[
      ...ltKnown.map(l=>{const on=haState(l.haEntity)==='on';
        return`<div class="s-item" onclick="togLight('${l.id}');closeSR()">
          <i class="ti ${l.icon}" style="color:${on?l.hex:'#556'};font-size:14px;width:18px;flex-shrink:0"></i>
          <div style="flex:1"><div style="font-size:10px;font-weight:700;color:var(--txt)">${l.n}</div></div>
          ${_ib(on?'⏹':'💡',`haCall('light','${on?'turn_off':'turn_on'}',{entity_id:'${l.haEntity}'});closeSR();haScheduleRefresh(1200)`,on?'#ff4455':'#ffd700')}
          ${_info(l.haEntity)}
        </div>`;
      }),
      ...ltHA.map(s=>{const on=s.state==='on';const fn=s.attributes?.friendly_name||s.entity_id;
        return`<div class="s-item" onclick="${_p(s.entity_id)}">
          <i class="ti ti-bulb" style="color:${on?'#ffd700':'#556'};font-size:14px;width:18px;flex-shrink:0"></i>
          <div style="flex:1"><div style="font-size:10px;font-weight:700;color:var(--txt)">${fn}</div></div>
          ${_ib(on?'⏹':'💡',`haCall('light','${on?'turn_off':'turn_on'}',{entity_id:'${s.entity_id}'});closeSR();haScheduleRefresh(1200)`,on?'#ff4455':'#ffd700')}
          ${_info(s.entity_id)}
        </div>`;
      })
    ].join('')});

  // Climatiseurs
  const clms=(S.clims||[]).filter(c=>(c.name+' '+c.room+' clim chauffage').toLowerCase().includes(q));
  if(clms.length)secs.push({lbl:'❄️ CLIMATISEURS',col:'#00c8ff',
    html:clms.map(c=>{const on=c.on;const t=c.roomTemp?Math.round(c.roomTemp)+'°C':c.temp+'°C';
      return`<div class="s-item" onclick="_go(1,'climat')">
        <i class="ti ti-wind" style="color:${on?'#00c8ff':'#556'};font-size:14px;width:18px;flex-shrink:0"></i>
        <div style="flex:1"><div style="font-size:10px;font-weight:700;color:var(--txt)">${c.name}</div>
        <div style="font-size:8px;color:var(--txt3)">${c.room} · ${t}</div></div>
        ${_ib(on?'⏹':'▶',`haCall('climate','${on?'turn_off':'turn_on'}',{entity_id:'${c.haEntity}'});haScheduleRefresh(1200)`,on?'#ff4455':'#00c8ff')}
        ${_info(c.haEntity)}
      </div>`;
    }).join('')});

  // Médias
  const mds=(S.media||[]).filter(m=>(m.n+' media tv son musique enceinte').toLowerCase().includes(q));
  if(mds.length)secs.push({lbl:'🎵 MÉDIAS',col:'#bb88ff',
    html:mds.map(m=>{const st=haState(m.haEntity);const pl=st==='playing';
      return`<div class="s-item" onclick="_go(2,'media')">
        <i class="ti ${m.icon}" style="color:${pl?m.col:'#556'};font-size:14px;width:18px;flex-shrink:0"></i>
        <div style="flex:1"><div style="font-size:10px;font-weight:700;color:var(--txt)">${m.n}</div>
        <div style="font-size:8px;color:var(--txt3)">${st||'—'}</div></div>
        ${_ib(pl?'⏸':'▶',`haCall('media_player','${pl?'media_pause':'media_play'}',{entity_id:'${m.haEntity}'});haScheduleRefresh(1200)`,m.col)}
        ${_info(m.haEntity)}
      </div>`;
    }).join('')});

  // Présence
  const PMAP=[
    {eid:'person.mat2viv',  n:'Matthias',    ico:'ti-user',          col:'#00e5ff'},
    {eid:'person.vichara',  n:'Vichara',     ico:'ti-user',          col:'#bb88ff'},
    {eid:'device_tracker.aria_2',n:'Tablette',ico:'ti-device-tablet',col:'#00ffcc'},
  ];
  const prs=PMAP.filter(p=>(p.n+' presence geo carte famille matthias vichara tablette').toLowerCase().includes(q));
  if(prs.length)secs.push({lbl:'👤 PRÉSENCE',col:'#00e5ff',
    html:prs.map(p=>{const st=haState(p.eid);const home=st==='home'||st==='Maison';
      return`<div class="s-item" onclick="_go(4,'radar')">
        <i class="ti ${p.ico}" style="color:${home?p.col:'#556'};font-size:14px;width:18px;flex-shrink:0"></i>
        <div style="flex:1"><div style="font-size:10px;font-weight:700;color:var(--txt)">${p.n}</div></div>
        <span style="font-size:8px;font-weight:700;color:${home?p.col:'#556'}">${home?'● MAISON':'○ ABSENT'}</span>
        ${_info(p.eid)}
      </div>`;
    }).join('')});

  // Sections génériques pour tous les autres domaines
  const _skipKnown=new Set([
    ...(S.lights||[]).map(l=>l.haEntity),
    ...(S.clims||[]).map(c=>c.haEntity),
    ...(S.media||[]).map(m=>m.haEntity),
    ...PMAP.map(p=>p.eid),
  ]);

  const SECS_DEF=[
    {doms:['switch'],                    lbl:'🔌 INTERRUPTEURS',  col:'#00e676'},
    {doms:['cover'],                     lbl:'📦 VOLETS & BÂCHES', col:'#fbbf24'},
    {doms:['input_boolean'],             lbl:'🔘 BOOLÉENS',        col:'#a78bfa'},
    {doms:['input_number','number'],     lbl:'🔢 NOMBRES',         col:'#fbbf24'},
    {doms:['input_select','select'],     lbl:'📋 SÉLECTIONS',      col:'#60a5fa'},
    {doms:['input_text'],                lbl:'✏️ TEXTES',           col:'#94a3b8'},
    {doms:['input_button','button'],     lbl:'⚡ BOUTONS',          col:'#f97316'},
    {doms:['input_datetime'],            lbl:'📅 DATE & HEURE',     col:'#34d399'},
    {doms:['script'],                    lbl:'▶ SCRIPTS',           col:'#f59e0b'},
    {doms:['scene'],                     lbl:'🎨 SCÈNES',           col:'#ec4899'},
    {doms:['automation'],               lbl:'🤖 AUTOMATIONS',      col:'#bb88ff'},
    {doms:['timer'],                     lbl:'⏱ MINUTERIES',        col:'#34d399'},
    {doms:['counter'],                   lbl:'🔢 COMPTEURS',        col:'#94a3b8'},
    {doms:['fan'],                       lbl:'💨 VENTILATEURS',     col:'#67e8f9'},
    {doms:['vacuum'],                    lbl:'🤖 ASPIRATEURS',      col:'#a3e635'},
    {doms:['water_heater'],              lbl:'💧 CHAUFFE-EAU',      col:'#f97316'},
    {doms:['alarm_control_panel'],       lbl:'🔒 ALARME',           col:'#ff4455'},
    {doms:['camera'],                    lbl:'📷 CAMÉRAS',          col:'#f87171'},
    {doms:['binary_sensor'],             lbl:'👁 DÉTECTEURS',       col:'#00ffcc'},
    {doms:['sensor'],                    lbl:'🌡️ CAPTEURS',         col:'#00ffcc'},
    {doms:['weather'],                   lbl:'⛅ MÉTÉO',            col:'#60a5fa'},
    {doms:['device_tracker'],            lbl:'📱 APPAREILS GPS',    col:'#00ffcc'},
    {doms:['update'],                    lbl:'🔄 MISES À JOUR',     col:'#fbbf24'},
    {doms:['group'],                     lbl:'🗂 GROUPES',           col:'#94a3b8'},
    {doms:['zone'],                      lbl:'📍 ZONES',            col:'#34d399'},
  ];

  SECS_DEF.forEach(def=>{
    const items=allMatches.filter(s=>{
      if(_skipKnown.has(s.entity_id))return false;
      return def.doms.includes(s.entity_id.split('.')[0]);
    });
    if(!items.length)return;
    secs.push({lbl:def.lbl,col:def.col,
      html:items.map(s=>{
        const dom=s.entity_id.split('.')[0];
        const dc=_dci(dom);
        const fn=s.attributes?.friendly_name||s.entity_id.replace(dom+'.','').replace(/_/g,' ');
        const unit=s.attributes?.unit_of_measurement||'';
        const stc=_stcolor(s.state);
        const val=(s.state+(unit?' '+unit:'')).slice(0,14);
        // Bouton d'action rapide selon domaine
        let quickBtn='';
        if(['switch','input_boolean'].includes(dom)){
          const on=s.state==='on';
          quickBtn=_ib(on?'⏹':'▶',`haCall('${dom}','${on?'turn_off':'turn_on'}',{entity_id:'${s.entity_id}'});haScheduleRefresh(1200)`,on?'#ff4455':'#00e676');
        }else if(dom==='cover'){
          const op=s.state==='open';
          quickBtn=_ib(op?'▼':'▲',`haCall('cover','${op?'close_cover':'open_cover'}',{entity_id:'${s.entity_id}'});haScheduleRefresh(1200)`,op?'#ff4455':'#00e676');
        }else if(dom==='script'){
          quickBtn=_ib('▶',`haCall('script','turn_on',{entity_id:'${s.entity_id}'});showToast('▶ Script lancé')`,dc.c);
        }else if(dom==='scene'){
          quickBtn=_ib('🎨',`haCall('scene','turn_on',{entity_id:'${s.entity_id}'});showToast('🎨 Scène activée')`,dc.c);
        }else if(dom==='automation'){
          const on=s.state==='on';
          quickBtn=_ib(on?'⏹':'▶',`haCall('automation','${on?'turn_off':'turn_on'}',{entity_id:'${s.entity_id}'});haScheduleRefresh(1200)`,on?'#ff4455':'#00e676');
        }else if(['input_button','button'].includes(dom)){
          quickBtn=_ib('⚡',`haCall('${dom}','press',{entity_id:'${s.entity_id}'});showToast('⚡ Appui envoyé')`,dc.c);
        }
        return`<div class="s-item" onclick="${_p(s.entity_id)}">
          <i class="ti ${dc.i}" style="color:${_stcolor(s.state)!=='#556'?dc.c:'#556'};font-size:14px;width:18px;flex-shrink:0"></i>
          <div style="flex:1;min-width:0">
            <div style="font-size:10px;font-weight:700;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${fn}</div>
            <div style="font-size:7.5px;color:var(--txt3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.entity_id}</div>
          </div>
          ${quickBtn}
          <span style="font-size:8px;font-weight:700;color:${stc};margin-left:2px;flex-shrink:0;max-width:50px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${val}</span>
          ${_info(s.entity_id)}
        </div>`;
      }).join('')
    });
  });

  if(!secs.length){
    res.innerHTML=`<div class="s-item" style="color:var(--txt3);justify-content:center;font-size:10px;padding:14px">Aucun résultat pour "<b>${v}</b>"</div>`;
  }else{
    res.innerHTML=secs.map(s=>`<div class="s-sep" style="color:${s.col}">${s.lbl}</div>${s.html}`).join('');
  }
  res.style.display='block';
}

// ── HEALTH CHECK ─────────────────────────────────────────────────────────────
let _hd=null;
async function healthCheck(){
  try{
    const r=await fetch(HA_URL+'/api/states',{headers:{'Authorization':'Bearer '+HA_TOKEN}});
    const states=await r.json();
    const m={};states.forEach(s=>{m[s.entity_id]=s;});
    const iss={crit:[],warn:[],info:[]};
    // Pipeline
    const pipe=m['sensor.aria_pipeline_statut']?.state||'?';
    if(pipe!=='Opérationnel'&&pipe!=='?'){
      (pipe.includes('KO')?iss.crit:iss.warn).push({i:'ti-microphone',l:'Pipeline TTS/STT',v:pipe});
    }
    // Disque
    const dp=parseInt(m['sensor.aria_disk_usage_pct']?.state)||0;
    const df=parseFloat(m['sensor.aria_disk_free_gb']?.state)||0;
    if(dp>=90)iss.crit.push({i:'ti-database',l:'Disque',v:dp+'%'});
    else if(dp>=85)iss.warn.push({i:'ti-database',l:'Disque',v:dp+'%'});
    // Alarme déclenchée
    const al=m['alarm_control_panel.vitrolles_alarm']?.state;
    if(al==='triggered')iss.crit.push({i:'ti-bell-ringing',l:'Alarme',v:'DÉCLENCHÉE'});
    // Automations sécurité OFF
    const sOff=states.filter(s=>s.entity_id.startsWith('automation.securite_')&&s.state==='off');
    if(sOff.length)iss.crit.push({i:'ti-shield-off',l:'Auto. sécurité OFF',v:sOff.length+' désactivées'});
    // Téléphones
    const phOff=['device_tracker.matthias_perso','device_tracker.vichara_perso'].filter(e=>m[e]?.state==='unavailable');
    if(phOff.length)iss.info.push({i:'ti-device-mobile-off',l:'Companion app',v:phOff.length+' déconnecté(s)'});
    // Niveau global
    const lvl=iss.crit.length?'crit':iss.warn.length?'warn':'ok';
    _hd={lvl,iss,pipe,dp,df,al,maint:m['input_text.aria_maintenance_status']?.state||'—',
      totAuto:states.filter(s=>s.entity_id.startsWith('automation.')).length,
      onAuto:states.filter(s=>s.entity_id.startsWith('automation.')&&s.state==='on').length,
      at:new Date()};
    const btn=document.getElementById('hbtn');const lbl=document.getElementById('hlbl');
    if(btn)btn.className='hb '+lvl;
    if(lbl)lbl.textContent=lvl==='ok'?'● OK':lvl==='warn'?'⚠ ALERTE':'🔴 CRITIQUE';
  }catch(e){
    const btn=document.getElementById('hbtn');if(btn)btn.className='hb warn';
    const lbl=document.getElementById('hlbl');if(lbl)lbl.textContent='⚠ ALERTE';
  }
}
function toggleHP(){const b=document.getElementById('hpb');if(b.classList.contains('show')){closeHP();return;}renderHP();document.getElementById('hpo').classList.add('show');b.classList.add('show');}
function closeHP(){document.getElementById('hpo').classList.remove('show');document.getElementById('hpb').classList.remove('show');}
function renderHP(){
  if(!_hd){healthCheck().then(renderHP);return;}
  const d=_hd;
  const lbls={ok:'✅ TOUT VA BIEN',warn:'⚠️ PROBLÈMES MINEURS',crit:'🔴 PROBLÈMES CRITIQUES'};
  const hd=document.getElementById('hphd');const ht=document.getElementById('hpht');
  if(hd)hd.className='hphd '+d.lvl;if(ht)ht.textContent=lbls[d.lvl];
  let h='';
  const smap=(arr,cls,ttl)=>arr.length?`<div class="hps"><div class="hpsh" style="color:${cls==='err'?'#ff4455':cls==='warn'?'#ff9900':'var(--acc)'}"><i class="ti ${cls==='err'?'ti-alert-circle':cls==='warn'?'ti-alert-triangle':'ti-info-circle'}"></i>${ttl} (${arr.length})</div>${arr.map(x=>`<div class="hpr"><div class="hds ${cls}"></div><div class="hpr-l">${x.l}</div><div class="hpr-v c-${cls}">${x.v}</div></div>`).join('')}</div>`:'';
  h+=smap(d.iss.crit,'err','CRITIQUE');h+=smap(d.iss.warn,'warn','MINEUR');h+=smap(d.iss.info,'ok','INFO');
  const pc=d.pipe==='Opérationnel'?'ok':d.pipe.includes('KO')?'err':'warn';
  const dc=d.dp>=90?'err':d.dp>=85?'warn':'ok';
  const ac=d.al==='armed_away'?'ok':d.al==='triggered'?'err':'warn';
  h+=`<div class="hps"><div class="hpsh"><i class="ti ti-cpu"></i>SYSTÈME</div>
    <div class="hpr"><div class="hds ${pc}"></div><div class="hpr-l">Pipeline TTS/STT</div><div class="hpr-v c-${pc}">${d.pipe}</div></div>
    <div class="hpr"><div class="hds ${dc}"></div><div class="hpr-l">Disque</div><div class="hpr-v c-${dc}">${d.dp}% · ${d.df.toFixed(1)}GB libres</div></div>
    <div class="hpr"><div class="hds ${ac}"></div><div class="hpr-l">Alarme</div><div class="hpr-v c-${ac}">${d.al||'—'}</div></div>
    <div class="hpr"><div class="hds ok"></div><div class="hpr-l">Automations</div><div class="hpr-v c-ok">${d.onAuto}/${d.totAuto} actives</div></div>
    <div class="hpr"><div class="hds ok" style="background:var(--txt3);box-shadow:none"></div><div class="hpr-l">Maintenance</div><div class="hpr-v" style="color:var(--txt3);font-size:9px">${d.maint}</div></div>
  </div>`;
  const ago=d.at?Math.round((Date.now()-d.at)/1000)+'s':'?';
  h+=`<div style="font-size:8px;color:var(--txt3);text-align:center;padding:3px 0">Vérifié il y a ${ago}</div>`;
  h+=`<button class="hpref" onclick="healthCheck().then(renderHP)">↻ ACTUALISER</button>`;
  h+=`<button class="hpref" style="background:#fbbf2408;border-color:#fbbf2433;color:#fbbf24;margin-top:4px" onclick="autoCleanup()">🧹 NETTOYER FANTÔMES</button>`;
  document.getElementById('hpbody').innerHTML=h;
}
async function autoCleanup(){
  showToast('🧹 Nettoyage…');
  try{
    const r=await fetch(HA_URL+'/api/services/shell_command/aria_cleanup_fantomes',{method:'POST',headers:{'Authorization':'Bearer '+HA_TOKEN,'Content-Type':'application/json'},body:'{}'});
    if(r.ok){showToast('✅ Nettoyage lancé');setTimeout(()=>{healthCheck().then(renderHP);},5000);}
    else showToast('⚠️ Erreur '+r.status);
  }catch(e){showToast('⚠️ '+e.message);}
}

const THEMES=[{id:'cyan',col:'#00c8ff',name:'Cyan'},{id:'orange',col:'#ff9900',name:'Orange'},{id:'purple',col:'#bb88ff',name:'Violet'},{id:'green',col:'#00ff88',name:'Vert'},{id:'red',col:'#ff4455',name:'Rouge'},{id:'pink',col:'#ff66aa',name:'Rose'},{id:'amber',col:'#ffcc00',name:'Ambre'},{id:'white',col:'#e0e8ff',name:'Blanc'}];
let curTheme='cyan';
function setTh(id){const t=THEMES.find(x=>x.id===id);if(!t)return;curTheme=id;document.getElementById('dash').className='dash th-'+id;const dot=document.getElementById('theme-dot');if(dot){dot.style.background=t.col;dot.style.borderColor=t.col;dot.style.boxShadow='0 0 8px '+t.col+'66';}document.querySelectorAll('.tp-dot').forEach(d=>d.classList.remove('cur'));const dc=document.getElementById('tpd-'+id);if(dc)dc.classList.add('cur');document.getElementById('theme-picker').classList.remove('show');showToast('Thème '+t.name);}
let _tpTimer=null;
function tpPress(e){if(e&&e.preventDefault)e.preventDefault();_tpTimer=setTimeout(()=>{document.getElementById('theme-picker').classList.add('show');_tpTimer=null;},500);}
function tpRelease(e){if(e&&e.preventDefault)e.preventDefault();if(_tpTimer){clearTimeout(_tpTimer);_tpTimer=null;}}
document.addEventListener('click',e=>{if(!e.target.closest('#theme-picker')&&!e.target.closest('#theme-dot'))document.getElementById('theme-picker').classList.remove('show');});

function tick(){const el=document.getElementById('clk');if(!el)return;const n=new Date();el.textContent=[n.getHours(),n.getMinutes(),n.getSeconds()].map(v=>String(v).padStart(2,'0')).join(':');const j=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'][n.getDay()];const mo=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'][n.getMonth()];document.getElementById('dt').textContent=j+' '+n.getDate()+' '+mo;}

(async function init(){
  const grid=document.getElementById('tp-grid');
  if(grid)grid.innerHTML=THEMES.map(t=>`<div class="tp-item" onclick="setTh('${t.id}')"><div class="tp-dot ${t.id===curTheme?'cur':''}" id="tpd-${t.id}" style="background:${t.col}"></div><div class="tp-name">${t.name}</div></div>`).join('');
  const dot=document.getElementById('theme-dot');if(dot){const t=THEMES.find(x=>x.id===curTheme);if(t){dot.style.background=t.col;dot.style.borderColor=t.col;dot.style.boxShadow='0 0 8px '+t.col+'66';}}
  setInterval(tick,1000);tick();
  // Charger l'onglet immédiatement, sans bloquer sur HA
  loadTab('accueil');
  // Fetch HA en parallèle puis rafraîchir l'affichage
  haFetch().then(()=>{if(window.renderCurrent)window.renderCurrent();updCnt();});
  healthCheck();
  setInterval(healthCheck,60000);

  // ── Config export pour aria_mobile.html ─────────────────────────────────
  // Modifier ici → aria_mobile.html se met à jour automatiquement au prochain chargement
  window.__ARIA_CFG__ = {
    ha:    HA_URL,
    tok:   HA_TOKEN,
    cams: {
      entree:   {snap:'camera.camera_entree_live_view',    motion:'binary_sensor.camera_entree_motion',    label:'Entrée'},
      piscine:  {snap:'camera.piscine_live_view',          motion:'binary_sensor.piscine_motion',          label:'Piscine'},
      garage:   {snap:'camera.garage_live_view',           motion:'binary_sensor.garage_motion',           label:'Garage'},
      baptiste: {snap:'camera.chambre_baptiste_live_view', motion:'binary_sensor.chambre_baptiste_motion', label:'Chambre Baptiste'},
      shani:    {snap:'camera.chambre_de_shani_live_view', motion:'binary_sensor.chambre_de_shani_motion', label:'Chambre Shani'},
    },
    tts:   ['media_player.google_home_veranda','media_player.alexa_salon'],
    alarm: 'alarm_control_panel.vitrolles_alarm',
    lat:   43.43, lon: 5.21,
    lights: S.lights.map(l=>({id:l.haEntity, n:l.n, icon:l.icon})),
    clims:  S.clims.map(c=>({id:c.haEntity,  n:c.name, sensor:c.tempSensor})),
    media:  S.media.map(m=>({id:m.haEntity,  n:m.n})),
    persons:S.radar.filter(r=>r.haEntity.startsWith('person.')||r.haEntity.startsWith('device_tracker.')).map(r=>({id:r.haEntity,n:r.n,col:r.hex})),
  };
  // Notifier les iframes enfants éventuels
  try{window.frames[0]?.postMessage({type:'aria_cfg',cfg:window.__ARIA_CFG__},'*');}catch(_){}
})();
</script>
